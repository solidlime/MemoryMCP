version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      # Persist Qdrant vector data on host (ensures ./storage is always pre-created)
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped
    environment:
      TZ: Asia/Tokyo
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  memory-mcp:
    image: ghcr.io/solidlime/memorymcp:latest
    container_name: memory-mcp
    ports:
      - "26262:26262"
    volumes:
      # Persist all data (memory, logs, cache) under APP_HOME (/opt/memory-mcp)
      - ./data:/opt/memory-mcp/data
      # Host Docker socket for sibling-container sandbox execution (no DinD needed)
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      # Point to the qdrant service (overrides Dockerfile default of localhost:6333)
      MEMORY_MCP_QDRANT__URL: http://qdrant:6333
      LANG: C.UTF-8
      # --- Code Execution Sandbox ---
      # Sandbox uses the host Docker socket (mounted above) to spawn sibling containers.
      # No separate DinD service required.
      MEMORY_MCP_SANDBOX__ENABLED: "true"
      # Explicitly empty so .env cannot accidentally override with a stale DinD host.
      MEMORY_MCP_SANDBOX__DOCKER_HOST: ""
      # HOST_DATA_ROOT: normally auto-detected from this container's own volume mounts.
      # Set manually only if auto-detection fails (e.g. on Synology, custom Docker setups).
      # Example: MEMORY_MCP_SANDBOX__HOST_DATA_ROOT: /volume1/docker/memory-mcp/data
      # MEMORY_MCP_SANDBOX__HOST_DATA_ROOT:
    # Load env vars from .env file (ignored by git) so you can override Dockerfile defaults
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:26262/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

networks:
  default:
    name: memory-mcp-network

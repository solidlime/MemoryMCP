version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      # Persist Qdrant vector data on host (ensures ./storage is always pre-created)
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  memory-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: memory-mcp
    ports:
      - "26262:26262"
    volumes:
      # Persist all data (memory, logs, cache) on host
      - ./data:/data
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      # Point to the qdrant service (overrides Dockerfile default of localhost:6333)
      MEMORY_MCP_QDRANT__URL: http://qdrant:6333
      # --- Code Execution Sandbox (optional) ---
      # To disable sandbox, comment out MEMORY_MCP_SANDBOX__ENABLED and MEMORY_MCP_SANDBOX__DOCKER_HOST,
      # and the sandbox-docker service below.
      MEMORY_MCP_SANDBOX__ENABLED: "true"
      MEMORY_MCP_SANDBOX__DOCKER_HOST: "tcp://sandbox-docker:2375"
    # Load env vars from .env file (ignored by git) so you can override Dockerfile defaults
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:26262/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # --- Code Execution Sandbox (DinD) ---
  # Runs a dedicated Docker daemon inside a container (Docker-in-Docker).
  # To disable: comment out this service and the env vars above, and the dind-storage volume below.
  sandbox-docker:
    image: docker:dind
    container_name: sandbox-docker
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""  # Disable TLS (internal network only - no port exposed)
    volumes:
      - ./data:/data          # Shared with memory-mcp so workspace paths align
      - dind-storage:/var/lib/docker
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  default:
    name: memory-mcp-network

# Uncomment when sandbox-docker service is disabled:
volumes:
  dind-storage:  # Isolates DinD's own image/container storage from the host

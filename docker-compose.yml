version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      # Persist Qdrant vector data on host (ensures ./storage is always pre-created)
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  memory-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: memory-mcp
    ports:
      - "26262:26262"
    volumes:
      # Persist all data (memory, logs, cache) on host
      - ./data:/data
      # DinD (Docker-in-Docker): mount host Docker socket so sandbox can spawn sibling containers
      # Remove this line if you do not use the code execution sandbox feature
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      # Point to the qdrant service (overrides Dockerfile default of localhost:6333)
      MEMORY_MCP_QDRANT__URL: http://qdrant:6333
      # --- Code Execution Sandbox (optional) ---
      # Uncomment MEMORY_MCP_SANDBOX__ENABLED to activate the sandbox.
      # By default the sandbox auto-detects the Docker socket (/var/run/docker.sock, /run/docker.sock).
      # To use a remote Docker host instead, set MEMORY_MCP_SANDBOX__DOCKER_HOST.
      # If your system uses a non-standard socket path (e.g. Synology, Podman, rootless Docker),
      # set MEMORY_MCP_SANDBOX__DOCKER_SOCK to the full socket path on the HOST.
      # MEMORY_MCP_SANDBOX__ENABLED: "true"
      # MEMORY_MCP_SANDBOX__DOCKER_HOST: "tcp://remote-docker-host:2375"
      # MEMORY_MCP_SANDBOX__DOCKER_SOCK: "/run/docker.sock"  # e.g. Synology NAS / rootless Docker
    # Load env vars from .env file (ignored by git) so you can override Dockerfile defaults
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:26262/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

networks:
  default:
    name: memory-mcp-network

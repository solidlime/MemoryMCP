# DATA_ROOT → ホスト側パス（.env.example 参照）。コンテナ側は NOUS_DATA_ROOT (/opt/nous/data) で固定。
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      # Persist Qdrant vector data on host (ensures ./storage is always pre-created)
      - ${DATA_ROOT}/qdrant:/qdrant/storage
    restart: unless-stopped
    environment:
      TZ: Asia/Tokyo
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  searxng-init:
    image: alpine:latest
    container_name: searxng-init
    volumes:
      - ${DATA_ROOT}/searxng:/etc/searxng
    command: >
      sh -c 'if [ ! -f /etc/searxng/settings.yml ]; then
      SECRET=$$(head -c 32 /dev/urandom | base64 | tr -d "=+/" | cut -c1-32);
      printf "use_default_settings: true\nserver:\n  secret_key: \"%s\"\n  limiter: false\n  image_proxy: true\nsearch:\n  formats:\n    - html\n    - json\n" "$$SECRET" > /etc/searxng/settings.yml;
      echo "Generated default settings.yml"; else echo "settings.yml already exists, skipping."; fi'

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "8080:8080"
    volumes:
      - ${DATA_ROOT}/searxng:/etc/searxng
    restart: unless-stopped
    depends_on:
      searxng-init:
        condition: service_completed_successfully
    environment:
      SEARXNG_BASE_URL: http://localhost:8080/
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nous:
    image: ghcr.io/solidlime/nous:latest
    container_name: nous
    ports:
      - "26262:26262"
    volumes:
      # Nous アプリデータ永続化（memory, logs, cache, config, skills）
      # DATA_ROOT/app（ホスト） → /opt/nous/data（コンテナ、=NOUS_DATA_ROOT）
      - ${DATA_ROOT}/app:/opt/nous/data
      # Host Docker socket for sibling-container sandbox execution (no DinD needed)
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
      searxng:
        condition: service_healthy
    environment:
      # Point to the qdrant service (overrides Dockerfile default of localhost:6333)
      NOUS_QDRANT__URL: http://qdrant:6333
      # SearXNG meta search engine URL
      SEARXNG_URL: http://searxng:8080
      LANG: C.UTF-8
      # --- Code Execution Sandbox ---
      # Sandbox uses the host Docker socket (mounted above) to spawn sibling containers.
      # No separate DinD service required.
      NOUS_SANDBOX__ENABLED: "true"
      # Explicitly empty so .env cannot accidentally override with a stale DinD host.
      NOUS_SANDBOX__DOCKER_HOST: ""
      # agent-browser installed to data volume by entrypoint script
      NOUS_AGENT_BROWSER_PATH: /opt/nous/data/.agent-browser/bin/agent-browser
      # HOST_DATA_ROOT: normally auto-detected from this container's own volume mounts.
      # Set manually only if auto-detection fails (e.g. on Synology, custom Docker setups).
      # Example: NOUS_SANDBOX__HOST_DATA_ROOT: /volume1/docker/nous/app
      # NOUS_SANDBOX__HOST_DATA_ROOT:
    # Load env vars from .env file (ignored by git) so you can override Dockerfile defaults
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:26262/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  sandbox:
    image: ghcr.io/solidlime/nous-sandbox:latest
    container_name: sandbox
    restart: unless-stopped
    volumes:
      # 全ペルソナの sandbox データ永続化
      # DATA_ROOT（ホスト）の sandbox/ サブディレクトリ → /home（コンテナ）
      # /home/{persona}/ は useradd -m で自動作成される
      - ${DATA_ROOT}/sandbox:/home
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE  # file access across users
      - CHOWN        # chown on bind-mounted /home for per-persona isolation
      - FOWNER        # needed for useradd to write /etc/shadow
      - SETUID        # set UID for per-persona users
      - SETGID        # set GID for per-persona users
    security_opt:
      - no-new-privileges:true

networks:
  default:
    name: nous-network

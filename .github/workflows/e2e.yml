name: E2E Dogfooding

on:
  schedule:
    - cron: "0 3 * * 1"  # 毎週月曜 03:00 UTC
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "memory_mcp/**"
      - "tests/e2e/**"
      - "data/*.zip"

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dogfooding:
    name: E2E Dogfooding Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
        options: >-
          --health-cmd "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
          --health-start-period 5s
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install PyTorch CPU
        run: pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Unzip legacy data
        run: |
          mkdir -p data/_tmp
          cd data/_tmp
          for zip in ../herta.zip ../nilou.zip ../citlali.zip; do
            name=$(basename "$zip" .zip)
            mkdir -p "$name"
            unzip -o "$zip" -d "$name"
          done

      - name: Start MCP server
        run: |
          python -m memory_mcp.main &
          sleep 10
          curl -f http://localhost:26262/health || exit 1
        env:
          MEMORY_MCP_QDRANT_URL: http://localhost:6333
          MEMORY_MCP_DATA_DIR: ./data/_tmp

      - name: Run E2E tests
        run: pytest tests/e2e/ -v --tb=long -m e2e
        env:
          MEMORY_MCP_URL: http://localhost:26262
          MEMORY_MCP_QDRANT_URL: http://localhost:6333
          MEMORY_MCP_DATA_DIR: ./data/_tmp

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            data/_tmp/
            pytest-results.xml

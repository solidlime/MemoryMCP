name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt into Node.js 24 for JavaScript actions to remove Node.js 20 deprecation warnings.
  # Verified upstream action.yml files indicate node24 is supported for the actions used here.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff bandit mypy
      - run: ruff check memory_mcp/ tests/
      - run: ruff format --check memory_mcp/ tests/
      - name: Security scan (Bandit)
        run: bandit -r memory_mcp/ -ll -x memory_mcp/migration/,memory_mcp/api/http/sections/
      - name: Type check (mypy)
        run: python -m mypy memory_mcp/ --ignore-missing-imports
        continue-on-error: true

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install CPU-only torch
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install test tools
        run: pip install pytest pytest-asyncio pytest-cov pytest-timeout httpx

      - name: Unit tests with coverage gate
        run: >-
          python -m pytest tests/unit/ tests/integration/test_http_routers.py
          -v --tb=short -m "not e2e and not slow" --timeout=60
          --cov=memory_mcp --cov-config=pyproject.toml
          --cov-fail-under=65

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint]
    timeout-minutes: 20
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
        options: >-
          --health-cmd "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
          --health-start-period 5s
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install CPU-only torch
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install test tools
        run: pip install pytest pytest-asyncio pytest-cov pytest-timeout httpx

      - name: Wait for Qdrant
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:6333/healthz; then break; fi
            sleep 2
          done

      - name: Integration tests
        run: python -m pytest tests/integration/ -v --tb=short --timeout=120 --cov=memory_mcp --cov-report=xml --cov-report=term-missing
        env:
          MEMORY_MCP_QDRANT_URL: http://localhost:6333
          MEMORY_MCP_DATA_ROOT: /tmp/test_data

      - name: Upload coverage
        if: always() && env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        with:
          token: ${{ env.CODECOV_TOKEN }}
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: coverage.xml
          if-no-files-found: ignore

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    timeout-minutes: 30
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
        options: >-
          --health-cmd "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
          --health-start-period 5s
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install CPU-only torch
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install test tools
        run: pip install pytest pytest-asyncio pytest-cov pytest-timeout httpx playwright pytest-playwright

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Wait for Qdrant
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:6333/healthz; then break; fi
            sleep 2
          done

      - name: Start MemoryMCP server
        run: python -m memory_mcp.main &
        env:
          MEMORY_MCP_QDRANT__URL: http://localhost:6333
          MEMORY_MCP_DATA_ROOT: /tmp/e2e_data
          MEMORY_MCP_SERVER__PORT: "26262"
          MEMORY_MCP_LOG_LEVEL: WARNING
          MEMORY_MCP_FORGETTING__ENABLED: "false"

      - name: Wait for MemoryMCP server
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:26262/health; then break; fi
            sleep 2
          done

      - name: E2E dogfooding tests
        run: python -m pytest tests/e2e/test_dogfooding.py -v --tb=short -m "e2e" --timeout=120
        env:
          MEMORY_MCP_URL: http://localhost:26262
          MEMORY_MCP_QDRANT_URL: http://localhost:6333
          MEMORY_MCP_DATA_ROOT: /tmp/e2e_data

      - name: E2E Playwright UI tests
        run: python -m pytest tests/e2e/ --ignore=tests/e2e/test_dogfooding.py -v --tb=short -m "e2e" --timeout=120
        env:
          MEMORY_MCP_URL: http://localhost:26262
          MEMORY_MCP_PORT: "26262"
          MEMORY_MCP_QDRANT_URL: http://localhost:6333
          MEMORY_MCP_DATA_ROOT: /tmp/e2e_data

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            test-results/
            pytest-results.xml
          if-no-files-found: ignore


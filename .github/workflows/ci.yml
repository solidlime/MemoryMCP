name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt into Node.js 24 for JavaScript actions to remove Node.js 20 deprecation warnings.
  # Verified upstream action.yml files indicate node24 is supported for the actions used here.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check-docs:
    name: Documentation Reminder
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if docs need updating
        id: check
        run: |
          # このコミットで変更されたファイル一覧
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff-tree --no-commit-id --name-only -r HEAD)

          # nous/ 配下のコード変更 (テスト・migration・__init__.py を除く)
          CODE_CHANGES=$(echo "$CHANGED" | grep '^nous/' | grep -v '/tests/' | grep -v '__init__\.py$' | grep -v '/migration/' | wc -l)

          # docs/ または README.md または CLAUDE.md の変更
          DOC_CHANGES=$(echo "$CHANGED" | grep -cE '^docs/|^README\.md$|^CLAUDE\.md$' || echo 0)

          # コミットメッセージに [skip-docs] が含まれているか
          SKIP_DOCS=$(git log -1 --format=%B | grep -ci '\[skip-docs\]' || echo 0)

          echo "CODE_CHANGES=$CODE_CHANGES"
          echo "DOC_CHANGES=$DOC_CHANGES"
          echo "SKIP_DOCS=$SKIP_DOCS"

          if [ "$CODE_CHANGES" -gt 0 ] && [ "$DOC_CHANGES" -eq 0 ] && [ "$SKIP_DOCS" -eq 0 ]; then
            echo "::warning title=ドキュメント未更新::nous/ にコード変更がありますが、docs/・README.md・CLAUDE.md のいずれも更新されていません。必要に応じてドキュメントを更新するか、意図的であればコミットメッセージに [skip-docs] を含めてください。"
            echo "reminder=true" >> $GITHUB_OUTPUT
          else
            if [ "$SKIP_DOCS" -gt 0 ]; then
              echo "ℹ️ [skip-docs] 指定あり → スキップ"
            else
              echo "✅ ドキュメント更新OK"
            fi
            echo "reminder=false" >> $GITHUB_OUTPUT
          fi

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff bandit mypy
      - run: ruff check nous/ tests/
      - run: ruff format --check nous/ tests/
      - name: Security scan (Bandit)
        run: bandit -r nous/ -ll -x nous/migration/,nous/api/http/sections/
        continue-on-error: true
      - name: Type check (mypy)
        run: python -m mypy nous/ --ignore-missing-imports
        continue-on-error: true

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install CPU-only torch
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install test tools
        run: pip install pytest pytest-asyncio pytest-cov pytest-timeout httpx

      - name: Unit tests with coverage gate
        run: >-
          python -m pytest tests/unit/ tests/integration/test_http_routers.py
          -v --tb=short -m "not slow" --timeout=60
          --cov=nous --cov-config=pyproject.toml
          --cov-fail-under=62

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint]
    timeout-minutes: 20
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
        options: >-
          --health-cmd "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
          --health-start-period 5s
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install CPU-only torch
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install test tools
        run: pip install pytest pytest-asyncio pytest-cov pytest-timeout httpx

      - name: Wait for Qdrant
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:6333/healthz; then break; fi
            sleep 2
          done

      - name: Integration tests
        run: python -m pytest tests/integration/ -v --tb=short --timeout=120 --cov=nous --cov-report=xml --cov-report=term-missing
        env:
          MEMORY_MCP_QDRANT_URL: http://localhost:6333
          MEMORY_MCP_DATA_ROOT: /tmp/test_data

      - name: Upload coverage
        if: always() && env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        with:
          token: ${{ env.CODECOV_TOKEN }}
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: coverage.xml
          if-no-files-found: ignore




version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      dev-dependencies:
        patterns:
          - "pytest*"
          - "ruff"
          - "bandit"
          - "mypy*"
      ml-dependencies:
        patterns:
          - "torch*"
          - "sentence-transformers*"
          - "transformers*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
